name: jenkinsops
version: "2.0.0"
description: >
  JenkinsOps — A phase-driven RL environment where an AI agent debugs real
  Jenkins CI/CD pipeline failures through structured multi-step reasoning.
  The agent must OBSERVE system state → DIAGNOSE root cause → FIX the issue.
  Shortcuts are penalized. Guessing is penalized. Reasoning is rewarded.

author: Sakshi Bhandari
tags:
  - openenv
  - devops
  - jenkins
  - cicd
  - reinforcement-learning
  - multi-step-reasoning
  - phase-gating

# ── OBSERVATION SPACE ──────────────────────────────────────────────────────
observation_space:
  pipeline_name:     string    # e.g. "payment-service-build"
  environment:       string    # UAT / Dev / PreProd / Prod
  failed_stage:      string    # e.g. "docker-build", "ecs-deployment"
  error_message:     string    # Raw error log from Jenkins
  stage_number:      integer   # Position in 7-stage pipeline (1–7)
  previous_actions:  list      # Actions already submitted this episode
  attempt_number:    integer   # Current attempt count
  available_actions: list      # Context-filtered valid actions for this scenario
  context_data:      dict      # Structured signal: HTTP headers, capacity, token age, etc.

# ── ACTION SPACE ────────────────────────────────────────────────────────────
action_space:
  fix:       string            # Action name from available_actions
  reasoning: string (optional) # Agent's justification

# Tiers (enforced by phase-gating state machine):
action_tiers:
  observe:  "inspect/check/verify/read/audit actions — gather evidence"
  diagnose: "identify/detect/confirm/compare actions — name the root cause"
  fix:      "apply/update/rotate/reinstall actions — resolve the issue"

# ── REWARD SPACE ────────────────────────────────────────────────────────────
reward_space:
  score:             float   # Range: 0.0 to 1.0 (non-negative)
  message:           string  # Feedback explaining the reward
  is_done:           boolean # True when episode ends
  trajectory_bonus:  boolean # True if agent completed full observe→diagnose→fix path

reward_table:
  correct_observe_action:     +0.1
  correct_diagnose_action:    +0.1
  correct_fix_after_prereqs:  +1.0
  correct_fix_base:           +0.8
  penalty_zero_floor:          0.0
  loop_termination:            0.0

# ── PHASE STATE MACHINE ─────────────────────────────────────────────────────
phases:
  observe:
    entry: episode_start
    exit:  first_observe_action_completed
    gate:  fix_tier_locked, diagnose_tier_soft
  diagnose:
    entry: observed == true
    exit:  first_diagnose_action_completed
    gate:  fix_tier_locked (medium/hard); fix_tier_open (easy)
  fix:
    entry: observed == true AND (easy OR diagnosed == true)
    result: episode_done = true, reward = 1.0

# ── TASKS ────────────────────────────────────────────────────────────────────
tasks:
  - id: easy
    name: Basic Pipeline Failure
    difficulty: easy
    steps: 2
    description: Direct 1:1 error→fix mapping. One observe step unlocks fix.
    max_attempts: 3
    example: "Branch not found → check names → correct_branch_name"

  - id: medium
    name: Deployment Failure
    difficulty: medium
    steps: 3
    description: Requires one observe + one diagnose before fix is unlocked.
    max_attempts: 5
    example: "ECS task not found → inspect → compare accounts → correct_task_definition"

  - id: hard
    name: Cascading Multi-Signal Failure
    difficulty: hard
    steps: 5
    description: Multi-service failures, shared root causes, ambiguous signals. Agent must use context_data to distinguish variants. Cannot shortcut to fix.
    max_attempts: 8
    example: "HTTP 403 → read headers → confirm auth status → detect cause → authenticate"

# ── ENDPOINTS ────────────────────────────────────────────────────────────────
endpoints:
  reset: /reset
  step:  /step
  state: /state
  tasks: /tasks

# ── DEPLOYMENT ────────────────────────────────────────────────────────────────
docker:
  port: 7860
  command: "uvicorn main:app --host 0.0.0.0 --port 7860"
  hf_space: true